name = "showstack"
main = "src/worker.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[[durable_objects.bindings]]
name = "ROOM"
class_name = "RoomObject"

[[durable_objects.bindings]]
name = "REGISTRY"
class_name = "RoomRegistry"

[[migrations]]
tag = "v1"
new_classes = ["RoomObject"]

[[migrations]]
tag = "v2"
new_classes = ["RoomRegistry"]

[[d1_databases]]
binding = "DB"
database_name = "showstack-db"
database_id = "22a4f116-38ba-4273-badc-d68c41c41623"
migrations_dir = "src/db/migrations"

[[r2_buckets]]
binding = "MEDIA"
bucket_name = "showstack-media"

[vars]
ENVIRONMENT = "production"
MEDIA_PUBLIC_URL = "https://showstackmedia.faithfireproduction.com"
ALLOWED_ORIGINS = "https://showstack-countdown.pages.dev,https://showstack-teleprompter.pages.dev,https://showstack.faithfireproduction.com,https://countdownstudio.faithfireproduction.com"

[[routes]]
pattern = "showstackapi.faithfireproduction.com/*"
zone_name = "faithfireproduction.com"
