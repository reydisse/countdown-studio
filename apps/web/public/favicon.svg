<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Dark rounded background -->
  <rect width="32" height="32" rx="7" fill="#181614"/>
  <!-- Track ring -->
  <circle cx="16" cy="16" r="11" stroke="#2c2825" stroke-width="2.5"/>
  <!-- Amber countdown arc (~80% filled, gap at bottom-left) -->
  <circle cx="16" cy="16" r="11" stroke="#e8a838" stroke-width="2.5"
    stroke-dasharray="55.3 13.8" stroke-linecap="round"
    transform="rotate(-90 16 16)"/>
  <!-- Hand pointing to 12 (almost zero) -->
  <line x1="16" y1="16" x2="16" y2="7" stroke="#f0ede8" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Centre pivot -->
  <circle cx="16" cy="16" r="2.2" fill="#e8a838"/>
</svg>
