<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Countdown Output</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500&family=JetBrains+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #181614;
    }

    /* ── Layer stack ─────────────────────────────────────────────────────── */
    .layer {
      position: absolute;
      inset: 0;
    }

    /* ── Background ──────────────────────────────────────────────────────── */
    #bg { z-index: 0; background: #181614; }

    /* ── Video ───────────────────────────────────────────────────────────── */
    #video-layer { z-index: 1; display: none; }
    #bg-video    { width: 100%; height: 100%; object-fit: cover; display: block; }

    /* ── Slideshow ───────────────────────────────────────────────────────── */
    #slideshow-layer { z-index: 2; display: none; overflow: hidden; }
    #ss-a, #ss-b {
      position: absolute; inset: 0;
      background-size: cover;
      background-position: center;
    }
    #ss-b { opacity: 0; }

    /* ── Static image ────────────────────────────────────────────────────── */
    #image-layer {
      z-index: 3; display: none;
      background-size: cover;
      background-position: center;
    }

    /* ── Overlay text ────────────────────────────────────────────────────── */
    #overlay-layer {
      z-index: 4; display: none;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 8%;
    }
    #overlay-box {
      padding: 1.2rem 1.8rem;
      border-radius: 6px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      color: #fff;
      font-size: clamp(1rem, 2.5vw, 2rem);
      text-align: center;
      font-family: "Bebas Neue", sans-serif;
    }

    /* ── Flash ───────────────────────────────────────────────────────────── */
    #flash-layer { z-index: 5; display: none; pointer-events: none; }

    /* ── Vignette ────────────────────────────────────────────────────────── */
    #vignette-layer { z-index: 6; display: none; pointer-events: none; }

    /* ── Scanlines ───────────────────────────────────────────────────────── */
    #scanlines-layer { z-index: 7; display: none; pointer-events: none; }

    /* ── Logo ────────────────────────────────────────────────────────────── */
    #logo-layer { z-index: 8; display: none; pointer-events: none; }
    #logo-img   { position: absolute; height: auto; object-fit: contain; }

    /* ── Countdown display ───────────────────────────────────────────────── */
    #display {
      z-index: 9;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #timer {
      font-family: "Bebas Neue", sans-serif;
      font-size: 20vw;
      line-height: 0.88;
      letter-spacing: 0.04em;
      color: #f0ede8;
      display: flex;
      align-items: center;
      transition: color 0.2s ease;
      -webkit-font-smoothing: antialiased;
    }

    #labels {
      display: none;
      flex-direction: column;
      align-items: center;
      margin-top: 2%;
      gap: 0.5%;
    }
    #lbl-main {
      font-size: 2.2vw;
      color: #f0ede8;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0.85;
    }
    #lbl-sub {
      font-size: 1.5vw;
      color: #8a8278;
      letter-spacing: 0.08em;
    }


    /* ── Connection overlay ──────────────────────────────────────────────── */
    #connecting {
      position: fixed; inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(24,22,20,.9);
      color: #8a8278;
      font-family: "DM Sans", sans-serif;
      font-size: .9rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      z-index: 100;
      transition: opacity .3s;
    }
    #connecting.hidden { display: none; }

    /* ── Animations ──────────────────────────────────────────────────────── */
    @keyframes blink-sep     { 0%,49%{opacity:1} 50%,100%{opacity:0} }
    @keyframes flash-anim    { from{opacity:.45} to{opacity:0} }
    @keyframes scene-zoom-in { from{transform:scale(var(--zoom-scale,1.8))} to{transform:scale(1)} }
  </style>
</head>
<body>
  <!-- Background zoom wrapper — ZOOM_IN targets this only, timer is unaffected -->
  <div id="bg-zoom" class="layer">
    <div id="bg"              class="layer"></div>
    <div id="video-layer"     class="layer"><video id="bg-video" autoplay muted loop playsinline></video></div>
    <div id="slideshow-layer" class="layer">
      <div id="ss-a"></div>
      <div id="ss-b"></div>
    </div>
    <div id="image-layer"    class="layer"></div>
  </div>

  <!-- These layers are NOT zoomed -->
  <div id="overlay-layer"  class="layer"><div id="overlay-box"></div></div>
  <div id="flash-layer"    class="layer"></div>
  <div id="vignette-layer" class="layer"></div>
  <div id="scanlines-layer" class="layer"></div>
  <div id="logo-layer"     class="layer"><img id="logo-img" src="" alt="logo"></div>
  <div id="display"        class="layer">
    <div id="timer"></div>
    <div id="labels">
      <div id="lbl-main"></div>
      <div id="lbl-sub"></div>
    </div>
  </div>

  <div id="scrim-layer" class="layer" style="z-index:15;pointer-events:none;background:#000;opacity:0;display:none"></div>

  <div id="connecting">Connecting…</div>

  <script>
  'use strict';

  // ── State ─────────────────────────────────────────────────────────────────
  let settings   = {};
  let timerState = { status: 'stopped', remaining: 0, total: 0 };
  let prevStatus = 'stopped'; // tracks previous tick status to detect end

  // ── Slideshow runtime ─────────────────────────────────────────────────────
  let ssActive = 'a', ssIdx = 0;
  let ssTimer = null;

  // ── Helpers ───────────────────────────────────────────────────────────────
  const $ = id => document.getElementById(id);

  const FONTS = {
    display: '"Bebas Neue", sans-serif',
    sans:    '"DM Sans", sans-serif',
    mono:    '"JetBrains Mono", monospace',
  };

  const LOGO_POS = {
    'top-left':      { top:'4%',    left:'3%'                          },
    'top-center':    { top:'4%',    left:'50%', transform:'translateX(-50%)' },
    'top-right':     { top:'4%',    right:'3%'                         },
    'bottom-left':   { bottom:'4%', left:'3%'                          },
    'bottom-center': { bottom:'4%', left:'50%', transform:'translateX(-50%)' },
    'bottom-right':  { bottom:'4%', right:'3%'                         },
  };

  function fmt(secs) {
    if (secs < 0) secs = 0;
    const h  = Math.floor(secs / 3600);
    const m  = Math.floor((secs % 3600) / 60);
    const s  = secs % 60;
    const mm = String(m).padStart(2,'0');
    const ss = String(s).padStart(2,'0');
    return h > 0 ? [String(h), mm, ss] : [mm, ss];
  }

  // ── Apply full settings ───────────────────────────────────────────────────
  function applySettings(s) {
    settings = s;

    // Body + base bg
    document.body.style.background = s.bgColor || '#181614';
    $('bg').style.background       = s.bgColor || '#181614';

    // Hide all bg layers first
    $('video-layer').style.display    = 'none';
    $('slideshow-layer').style.display = 'none';
    $('image-layer').style.display    = 'none';

    if (s.bgMode === 'image' && s.bgAssetUrl) {
      const il = $('image-layer');
      il.style.backgroundImage    = `url(${s.bgAssetUrl})`;
      il.style.backgroundSize     = s.imageSize || 'cover';
      il.style.backgroundPosition = 'center';
      il.style.display            = 'block';

    } else if (s.bgMode === 'video' && s.bgAssetUrl) {
      const ve = $('bg-video');
      if (ve.src !== s.bgAssetUrl) {
        ve.src   = s.bgAssetUrl;
        ve.muted = s.videoMuted !== false;
        ve.loop  = s.videoLoop  !== false;
        ve.play().catch(() => {});
      }
      $('video-layer').style.display = 'block';

    } else if (s.bgMode === 'slideshow' && s.slideshowUrls?.length) {
      $('slideshow-layer').style.display = 'block';
      initSlideshow();
    }

    // Overlay text
    if (s.overlayEnabled && s.overlayText) {
      const ob = $('overlay-box');
      ob.textContent   = s.overlayText;
      ob.style.fontFamily = FONTS[s.font] || FONTS.display;
      $('overlay-layer').style.display = 'flex';
    } else {
      $('overlay-layer').style.display = 'none';
    }

    // Vignette
    if (s.vignetteEnabled) {
      const a = ((s.vignetteIntensity || 40) / 100) * 0.85;
      const vl = $('vignette-layer');
      vl.style.background = `radial-gradient(ellipse at center, transparent 35%, rgba(0,0,0,${a.toFixed(3)}) 100%)`;
      vl.style.display    = 'block';
    } else {
      $('vignette-layer').style.display = 'none';
    }

    // Scanlines
    if (s.scanlinesEnabled) {
      const a  = ((s.scanlinesIntensity || 30) / 100) * 0.6;
      const sl = $('scanlines-layer');
      sl.style.backgroundImage = `repeating-linear-gradient(0deg,rgba(0,0,0,${a.toFixed(3)}) 0px,rgba(0,0,0,${a.toFixed(3)}) 1px,transparent 1px,transparent 3px)`;
      sl.style.display         = 'block';
    } else {
      $('scanlines-layer').style.display = 'none';
    }

    applyLogo(s);
    applyLabels(s);
    renderTimer();
  }

  function applyLogo(s) {
    const ll = $('logo-layer');
    const li = $('logo-img');
    if (!s.logoAssetUrl) { ll.style.display = 'none'; return; }

    li.src         = s.logoAssetUrl;
    li.style.width = (s.logoSize || 80) + 'px';

    // Reset then apply position
    Object.assign(li.style, { top:'', left:'', right:'', bottom:'', transform:'' });
    const pos = LOGO_POS[s.logoPosition || 'top-right'] || LOGO_POS['top-right'];
    Object.assign(li.style, pos);

    ll.style.display = 'block';
  }

  function applyLabels(s) {
    const labelsEl = $('labels');
    if (s.labelEnabled && (s.labelMain || s.labelSub)) {
      const ts = (s.textSize || 100) / 100;
      const ff = FONTS[s.font] || FONTS.display;
      const lm = $('lbl-main');
      const ls = $('lbl-sub');
      lm.textContent      = s.labelMain || '';
      lm.style.fontSize   = `${ts * 2.2}vw`;
      lm.style.color      = s.textColor || '#f0ede8';
      lm.style.fontFamily = ff;
      ls.textContent      = s.labelSub  || '';
      ls.style.fontSize   = `${ts * 1.5}vw`;
      ls.style.fontFamily = ff;
      labelsEl.style.display = 'flex';
    } else {
      labelsEl.style.display = 'none';
    }
  }

  // ── Timer render ──────────────────────────────────────────────────────────
  function renderTimer() {
    const ts = timerState;
    const s  = settings;
    const el = $('timer');

    el.style.fontFamily = FONTS[s.font || 'display'] || FONTS.display;
    el.style.fontSize   = `${((s.textSize || 100) / 100) * 20}vw`;

    let color = s.textColor || '#f0ede8';
    if (ts.status === 'running') {
      if      (ts.remaining <= (s.dangerThreshold || 10))                             color = '#f5464a';
      else if (s.warnFlashEnabled && ts.remaining <= (s.warnThreshold || 30)) color = '#f5a623';
    }
    if (ts.status === 'stopped') color = '#8a8278';
    el.style.color   = color;
    el.style.opacity = ts.status === 'stopped' ? '0.6' : '1';

    const parts   = (ts.status === 'stopped' && ts.remaining === 0) ? ['--','--'] : fmt(ts.remaining);
    const blink   = s.blinkSeparator && ts.status === 'running';
    el.innerHTML  = parts.map((p, i) => {
      const sep = i > 0
        ? `<span style="${blink ? 'animation:blink-sep 1s step-end infinite' : ''}">:</span>`
        : '';
      return sep + `<span>${p}</span>`;
    }).join('');

  }

  // ── Slideshow ─────────────────────────────────────────────────────────────
  function initSlideshow() {
    const urls = settings.slideshowUrls || [];
    if (!urls.length) return;

    clearInterval(ssTimer);

    ssIdx    = 0;
    ssActive = 'a';
    $('ss-a').style.backgroundImage = `url(${urls[0]})`;
    $('ss-a').style.backgroundSize  = settings.slideshowSize || 'cover';
    $('ss-b').style.backgroundImage = '';
    $('ss-b').style.opacity         = '0';

    if (urls.length > 1) {
      ssTimer = setInterval(advanceSlide, settings.slideshowInterval || 5000);
    }
  }

  function advanceSlide() {
    const urls = settings.slideshowUrls || [];
    if (urls.length < 2) return;
    ssIdx = (ssIdx + 1) % urls.length;

    const from = $('ss-' + ssActive);
    ssActive   = ssActive === 'a' ? 'b' : 'a';
    const to   = $('ss-' + ssActive);

    to.style.backgroundImage = `url(${urls[ssIdx]})`;
    to.style.backgroundSize  = settings.slideshowSize || 'cover';
    to.style.transition      = 'opacity 600ms ease-in-out';
    to.style.opacity         = '1';
    from.style.transition    = 'opacity 600ms ease-in-out';
    from.style.opacity       = '0';
  }

  // ── Cue action handler ────────────────────────────────────────────────────
  function executeCueAction(action) {
    const p  = action.payload || {};
    const au = (settings.assetUrls || {})[p.assetId];

    switch (action.type) {
      case 'SWAP_BG':
        if (au) applySettings({ ...settings, bgAssetUrl: au.url, bgMode: au.type === 'video' ? 'video' : 'image' });
        break;

      case 'PLAY_AUDIO':
        if (au?.url) {
          const a = new Audio(au.url);
          a.volume = Math.max(0, Math.min(1, (p.volume || 80) / 100));
          a.play().catch(() => {});
        }
        break;

      case 'SET_LABEL':
        settings = { ...settings, labelMain: p.main || '', labelSub: p.sub || '', labelEnabled: true };
        applyLabels(settings);
        break;

      case 'SET_OVERLAY': {
        const ob = $('overlay-box');
        ob.textContent = p.text || '';
        if (p.color) ob.style.background = `rgba(0,0,0,${(p.opacity || 60) / 100})`;
        $('overlay-layer').style.display = 'flex';
        break;
      }

      case 'FLASH_SCREEN': {
        const fl  = $('flash-layer');
        const dur = p.duration || 250;
        fl.style.cssText = `position:absolute;inset:0;background:${p.color || '#ffffff'};pointer-events:none;z-index:15;display:block;animation:flash-anim ${dur}ms ease-out both`;
        setTimeout(() => { fl.style.display = 'none'; fl.style.animation = ''; }, dur + 60);
        break;
      }

      case 'SWAP_LOGO':
        if (au) {
          settings = { ...settings, logoAssetUrl: au.url,
                       logoPosition: p.position || settings.logoPosition,
                       logoSize:     p.size     || settings.logoSize };
          applyLogo(settings);
        }
        break;

      case 'TOGGLE_EFFECT':
        if (p.effect === 'vignette')  { settings = { ...settings, vignetteEnabled:  !!p.enabled }; applySettings(settings); }
        if (p.effect === 'scanlines') { settings = { ...settings, scanlinesEnabled: !!p.enabled }; applySettings(settings); }
        break;

      case 'SHOW_LOGO':
        if (settings.logoAssetUrl) $('logo-layer').style.display = 'block';
        break;
      case 'HIDE_LOGO':
        $('logo-layer').style.display = 'none';
        break;

      case 'SET_BG_COLOR': {
        const color = p.color || '#181614';
        settings = { ...settings, bgMode: 'color', bgColor: color };
        applySettings(settings);
        break;
      }

      case 'SLIDESHOW_NEXT':
        if ((settings.slideshowUrls || []).length > 1) advanceSlide();
        break;

      case 'SLIDESHOW_PREV': {
        const urls = settings.slideshowUrls || [];
        if (urls.length > 1) {
          ssIdx = (ssIdx - 2 + urls.length) % urls.length;
          advanceSlide();
        }
        break;
      }

      // TIMER_PLAY / TIMER_PAUSE — output is display-only; these are no-ops here
      case 'TIMER_PLAY':
      case 'TIMER_PAUSE':
        break;

      // ── Scrim / black-out transitions ────────────────────────────────────
      case 'FADE_TO_BLACK': {
        const sl = $('scrim-layer'), dur = p.duration || 1500;
        sl.style.background  = p.color || '#000';
        sl.style.opacity     = '0';
        sl.style.transition  = 'none';
        sl.style.display     = 'block';
        requestAnimationFrame(() => {
          sl.style.transition = `opacity ${dur}ms ease-in-out`;
          sl.style.opacity    = '1';
        });
        break;
      }
      case 'FADE_FROM_BLACK': {
        const sl = $('scrim-layer'), dur = p.duration || 1500;
        sl.style.opacity    = '1';
        sl.style.transition = 'none';
        sl.style.display    = 'block';
        requestAnimationFrame(() => {
          sl.style.transition = `opacity ${dur}ms ease-in-out`;
          sl.style.opacity    = '0';
          setTimeout(() => { if (sl.style.opacity === '0') sl.style.display = 'none'; }, dur + 100);
        });
        break;
      }
      case 'CUT_TO_BLACK': {
        const sl = $('scrim-layer');
        sl.style.background  = p.color || '#000';
        sl.style.transition  = 'none';
        sl.style.opacity     = '1';
        sl.style.display     = 'block';
        break;
      }
      case 'CUT_FROM_BLACK': {
        const sl = $('scrim-layer');
        sl.style.transition = 'none';
        sl.style.opacity    = '0';
        sl.style.display    = 'none';
        break;
      }

      // ── Zoom-in ease-out on the timer display ─────────────────────────────
      case 'ZOOM_IN': {
        const scale = p.scale    || 1.8;
        const dur   = p.duration || 2000;
        const el    = $('bg-zoom');
        if (!el) break;
        el.getAnimations().forEach(a => a.cancel());
        el.animate(
          [{ transform: `scale(${scale})`, transformOrigin: 'center center' },
           { transform: 'scale(1)',         transformOrigin: 'center center' }],
          { duration: dur, easing: 'cubic-bezier(0.16,1,0.3,1)', fill: 'both' }
        );
        break;
      }
    }
  }

  // ── WebSocket ─────────────────────────────────────────────────────────────
  function connect() {
    const conn = $('connecting');
    conn.textContent = 'Connecting…';
    conn.classList.remove('hidden');

    const wsProto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const ws = new WebSocket(wsProto + '//' + location.host);

    ws.onopen = () => {
      conn.classList.add('hidden');
      // Fetch initial settings in case server has them before WS push arrives
      fetch('/api/settings')
        .then(r => r.json())
        .then(s => { if (Object.keys(s).length > 0) applySettings(s); })
        .catch(() => {});
    };

    ws.onmessage = ({ data }) => {
      let msg;
      try { msg = JSON.parse(data); } catch { return; }
      const { type, payload } = msg;

      if (type === 'timer:tick' || type === 'timer:state') {
        const wasRunning = timerState.status === 'running';
        timerState = payload;
        renderTimer();
        // Detect natural end (running → stopped @ 0) and execute end behaviour
        if (wasRunning && timerState.status === 'stopped' && timerState.remaining === 0) {
          const end = settings.endBehavior || 'hold';
          if (end === 'fadeout') {
            executeCueAction({ type: 'FADE_TO_BLACK', payload: { duration: 1500, color: '#000000' } });
          }
          // 'loop' is handled server-side by AppShell sending reset+play — output just follows
          // 'hold' requires no action
        }
      } else if (type === 'settings:changed') {
        applySettings(payload);
      } else if (type === 'cue:fired') {
        (payload.cue.actions || []).forEach(executeCueAction);
      }
    };

    ws.onclose = () => {
      conn.textContent = 'Reconnecting…';
      conn.classList.remove('hidden');
      setTimeout(connect, 2000);
    };
  }

  // ── Boot ──────────────────────────────────────────────────────────────────
  renderTimer();
  connect();
  </script>
</body>
</html>
